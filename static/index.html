<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripPilot • Global Tourism Services</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>TripPilot</h1>
      <p>Discover bookable tourism services worldwide by category.</p>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <input id="searchInput" type="search" placeholder="Search city, service, country..." />
        <h2>Recommended Categories</h2>
        <nav id="categoryNav" class="category-nav"></nav>
      </aside>

      <section class="content">
        <div class="map-panel">
          <h2>World Explorer View</h2>
          <p>Select a service to view its location details.</p>
          <div id="mapInfo" class="map-info">No service selected.</div>
        </div>
        <div id="serviceGrid" class="service-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
