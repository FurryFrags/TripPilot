<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripPilot • Global Tourism Services</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>TripPilot</h1>
      <p>Discover bookable tourism services worldwide by category.</p>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <input id="searchInput" type="search" placeholder="Search city, service, country..." />
        <h2>Recommended Categories</h2>
        <nav id="categoryNav" class="category-nav"></nav>
      </aside>

      <section class="content">
        <div class="map-panel">
          <h2>World Explorer View</h2>
          <p>Global map with live pins for all services currently in view.</p>
          <div id="worldMap" class="map-canvas-wrap" aria-label="Interactive world map"></div>
          <div id="mapLegend" class="map-legend" aria-label="Map legend"></div>
          <div id="mapInfo" class="map-info">No service selected.</div>
        </div>
        <div id="serviceGrid" class="service-grid"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
